name: Build taro (Release)

# This workflow is for RELEASE builds only (multi-platform with cross-compilation)
# For fast development iteration on ARM (Raspberry Pi):
#   ssh double2and9@192.168.31.5
#   cd ~/taro
#   git pull
#   docker build -t double2and9/taro:latest .
#   docker-compose restart taro

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional explicit image tag, e.g. 0.1.0-test'
        required: false
        type: string
      build_platforms:
        description: 'Platforms to build (default: linux/arm64 only for speed)'
        required: false
        type: string
        default: 'linux/arm64'

jobs:
  build-docker:
    name: Build taro Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/taro
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ inputs.build_platforms || 'linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
